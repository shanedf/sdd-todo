services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_PATH=/app/data/todos.db
      - API_PORT=3000
    volumes:
      - todo-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  todo-data:
